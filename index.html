<!DOCTYPE html>
<html>
<head>
    <title>Frog Census Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; margin: 20px; }
        body { font-family: Arial, sans-serif; }
        .legend { background: white; padding: 10px; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Frog Census Observations</h2>
    <div id="map"></div>
    <div class="legend" id="legend"></div>

    <script>
        var map = L.map('map').setView([-37.8, 144.95], 10);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);

        // Load your GeoJSON file
        fetch('frog_census.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function(feature, layer) {
                        if (feature.properties) {
                            var popupContent = "<b>Common Name:</b> " + (feature.properties.Common_nam || 'N/A') + "<br>" +
                                               "<b>Scientific:</b> " + (feature.properties.Scientific || 'N/A') + "<br>" +
                                               "<b>Method:</b> " + (feature.properties.Type_of_ob || 'N/A');
                            layer.bindPopup(popupContent);
                        }
                    },
                    pointToLayer: function(feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 8,
                            fillColor: "#3388ff",
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    }
                }).addTo(map);
                
                document.getElementById('legend').innerHTML = "<b>Legend</b><br>🔵 Frog observation<br>Click marker for details";
            })
            .catch(error => console.error('Error loading GeoJSON:', error));
    </script>
</body>
</html>
